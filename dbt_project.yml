name: 'home_credit_risk'
version: '1.0.0'
config-version: 2

profile: 'home_credit_risk'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]


clean-targets: ["target", "dbt_packages"]

# staging/intermediate -> views (cheap, fresh) ; marts -> tables (fast for BI)
models:
  home_credit_risk:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
